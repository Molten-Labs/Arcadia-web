kind = "web"
previewPath = "/arcadia/"
title = "Arcadia"
version = "1.0.0"
id = "artifacts/arcadia-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/arcadia/" ]
localPort = 24837

[services.development]
run = "pnpm --filter @workspace/arcadia-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arcadia-web", "run", "build" ]
publicDir = "artifacts/arcadia-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24837"
BASE_PATH = "/arcadia/"
